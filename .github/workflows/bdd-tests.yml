name: Playwright BDD Tests

on:
  repository_dispatch:
    types: [vercel-deploy]
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'

run-name: >
  ${{ github.event_name == 'repository_dispatch' && 'Playwright BDD Tests — triggered by Vercel deploy' ||
      github.event_name == 'workflow_dispatch' && 'Playwright BDD Tests — manual run' ||
      'Playwright BDD Tests — nightly run' }}

jobs:
  bdd-tests:
    name: Playwright BDD Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run BDD tests
        run: mkdir -p reports && npm test

      - name: Generate HTML report
        if: always()
        run: |
          mkdir -p public
          node -e "
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('reports/cucumber-report.json', 'utf8'));
          let passed = 0, failed = 0, total = 0;
          const rows = report.flatMap(feature =>
            feature.elements.map(scenario => {
              const allPassed = scenario.steps.every(s => s.result.status === 'passed');
              const status = allPassed ? 'passed' : 'failed';
              if (allPassed) passed++; else failed++;
              total++;
              const tag = scenario.tags?.map(t => t.name).join(', ') || '';
              return \`<tr class=\"\${status}\"><td>\${feature.name}</td><td>\${scenario.name}</td><td>\${tag}</td><td class=\"status\">\${status.toUpperCase()}</td></tr>\`;
            })
          ).join('');
          const html = \`<!DOCTYPE html>
          <html><head><meta charset=\"UTF-8\"><title>Playwright BDD Report</title>
          <style>
            body{font-family:sans-serif;margin:40px;background:#f5f5f5}
            h1{color:#333}
            .summary{display:flex;gap:24px;margin-bottom:24px}
            .card{background:#fff;border-radius:8px;padding:16px 24px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
            .card.pass{border-top:4px solid #4caf50}.card.fail{border-top:4px solid #f44336}.card.total{border-top:4px solid #2196f3}
            .card .num{font-size:2em;font-weight:bold}.card .lbl{color:#888;font-size:.9em}
            table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.1)}
            th{background:#37474f;color:#fff;padding:12px 16px;text-align:left}
            td{padding:10px 16px;border-bottom:1px solid #eee}
            tr.passed .status{color:#4caf50;font-weight:bold}
            tr.failed .status{color:#f44336;font-weight:bold}
            tr:hover{background:#f9f9f9}
          </style></head>
          <body>
          <h1>Playwright BDD Test Report</h1>
          <p>Generated: \${new Date().toUTCString()}</p>
          <div class=\"summary\">
            <div class=\"card total\"><div class=\"num\">\${total}</div><div class=\"lbl\">Total</div></div>
            <div class=\"card pass\"><div class=\"num\">\${passed}</div><div class=\"lbl\">Passed</div></div>
            <div class=\"card fail\"><div class=\"num\">\${failed}</div><div class=\"lbl\">Failed</div></div>
          </div>
          <table><thead><tr><th>Feature</th><th>Scenario</th><th>Xray Tag</th><th>Status</th></tr></thead>
          <tbody>\${rows}</tbody></table>
          </body></html>\`;
          fs.writeFileSync('public/index.html', html);
          console.log('Report generated: public/index.html');
          "

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
